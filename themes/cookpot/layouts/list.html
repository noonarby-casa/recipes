{{ define "main" }}
  <h1 class="page-title">{{ .Title }}</h1>
  {{ if .Content }}
    <div class="page-content">
      {{ .Content }}
    </div>
  {{ end }}
  {{ partial "search.html" . }}
  <div id="search-results" class="recipe-list" style="display: none;"></div>
  <div id="recipe-list-default">
    {{ $paginator := .Paginate .Pages.ByDate.Reverse }}
    <div class="recipe-list">
      {{ range $paginator.Pages }}
        {{ partial "recipe-list-item.html" . }}
      {{ end }}
    </div>
    {{ partial "pagination.html" . }}
  </div>
{{ end }}
