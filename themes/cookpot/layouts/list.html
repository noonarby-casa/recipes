{{ define "main" }}
  <h1 class="page-title">{{ .Title }}</h1>
  {{ if .Content }}
    <div class="page-content">
      {{ .Content }}
    </div>
  {{ end }}
  <div class="recipe-list">
    {{ range .Pages.ByDate.Reverse }}
      {{ partial "recipe-list-item.html" . }}
    {{ end }}
  </div>
{{ end }}
