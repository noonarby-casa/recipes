{{ define "main" }}
  <h1 class="page-title">{{ .Title }}</h1>
  {{ if .Content }}
    <div class="page-content">
      {{ .Content }}
    </div>
  {{ end }}
  {{ $paginator := .Paginate .Pages.ByDate.Reverse }}
  <div class="recipe-list">
    {{ range $paginator.Pages }}
      {{ partial "recipe-list-item.html" . }}
    {{ end }}
  </div>
  {{ partial "pagination.html" . }}
{{ end }}
