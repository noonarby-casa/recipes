<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary | plainify | truncate 160 }}{{ else }}Delicious homemade recipes from the Noonarby Casa.{{ end }}">

<link rel="apple-touch-icon" href="{{ "icon-600.png" | relURL }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ "icon-600.png" | relURL }}">
