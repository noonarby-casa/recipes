<h1>
  <a href="{{ site.Home.RelPermalink }}"
    ><img
      src="{{ "icon-72.png" | relURL }}"
      alt=""
      width="24"
      height="24"
      class="header-logo"
    />{{ site.Title }}</a
  >
</h1>
<div class="header-right">
  {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
  <a
    href="#"
    class="header-random-recipe"
    aria-label="Random recipe"
    id="header-random-recipe"
    title="Random recipe"
    data-recipes="{{- $urls := slice -}}{{- range site.RegularPages -}}
      {{- $urls = $urls | append .RelPermalink -}}
    {{- end -}}{{- $urls | jsonify -}}"
  >
    <svg
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="16 3 21 3 21 8"></polyline>
      <line x1="4" y1="20" x2="21" y2="3"></line>
      <polyline points="21 16 21 21 16 21"></polyline>
      <line x1="15" y1="15" x2="21" y2="21"></line>
      <line x1="4" y1="4" x2="9" y2="9"></line>
    </svg>
  </a>
  <a
    href="{{ site.Home.RelPermalink }}?search=focus"
    class="header-search-toggle"
    aria-label="Search recipes"
    id="header-search-toggle"
  >
    <svg
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </a>
  <button
    class="header-theme-toggle"
    aria-label="Toggle dark mode"
    id="header-theme-toggle"
    title="Toggle dark mode"
  >
    <svg
      class="theme-icon-light"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg
      class="theme-icon-dark"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</div>
