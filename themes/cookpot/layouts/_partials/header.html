<h1>
  <a href="{{ site.Home.RelPermalink }}"
    ><img
      src="{{ "icon-72.png" | relURL }}"
      alt=""
      width="24"
      height="24"
      class="header-logo"
    />{{ site.Title }}</a
  >
</h1>
<div class="header-right">
  {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
  <a
    href="#"
    class="header-random-recipe"
    aria-label="Random recipe"
    id="header-random-recipe"
    title="Random recipe"
    data-recipes="{{- $urls := slice -}}{{- range site.RegularPages -}}
      {{- $urls = $urls | append .RelPermalink -}}
    {{- end -}}{{- $urls | jsonify -}}"
  >
    <svg
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="16 3 21 3 21 8"></polyline>
      <line x1="4" y1="20" x2="21" y2="3"></line>
      <polyline points="21 16 21 21 16 21"></polyline>
      <line x1="15" y1="15" x2="21" y2="21"></line>
      <line x1="4" y1="4" x2="9" y2="9"></line>
    </svg>
  </a>
  <a
    href="{{ site.Home.RelPermalink }}?search=focus"
    class="header-search-toggle"
    aria-label="Search recipes"
    id="header-search-toggle"
  >
    <svg
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </a>
</div>
