<div class="recipe-search-container">
  <div class="recipe-search-box">
    <svg
      class="search-icon"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input
      type="search"
      id="recipe-search-input"
      placeholder="Search recipes by title, ingredients, source, or tags..."
      autocomplete="off"
      aria-label="Search recipes"
    />
    <button
      id="recipe-search-clear"
      class="search-clear-btn"
      aria-label="Clear search"
      style="display: none;"
    >
      <svg
        viewBox="0 0 24 24"
        width="16"
        height="16"
        stroke="currentColor"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  <div
    id="search-results-info"
    class="search-results-info"
    style="display: none;"
  ></div>
</div>

<template id="recipe-search-item-template">
  <article class="recipe-list-item">
    <div class="recipe-list-image-container" style="display: none;">
      <div class="recipe-list-image">
        <img
          class="recipe-image"
          src=""
          srcset=""
          sizes="(max-width: 599px) 90px, 130px"
          width="130"
          height="130"
          alt=""
          loading="lazy"
        />
      </div>
    </div>
    <div class="recipe-list-content">
      <h2 class="recipe-list-title"><a class="recipe-link" href=""></a></h2>
      <div class="recipe-list-meta">
        <div class="recipe-list-meta-left">
          <time datetime="" class="recipe-list-date"></time>
          <span class="recipe-meta-separator">•</span>
          <div class="recipe-time">
            <svg
              class="time-icon"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              stroke="currentColor"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="time-text"></span>
          </div>
          <span class="recipe-meta-separator">•</span>
          <div class="recipe-source">
            <svg
              class="source-icon"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              stroke="currentColor"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="source-text"></span>
          </div>
        </div>
        <div class="recipe-tags-container" style="display: none;">
          <div>Tags:</div>
          <ul class="recipe-tags-list"></ul>
        </div>
      </div>
    </div>
  </article>
</template>
