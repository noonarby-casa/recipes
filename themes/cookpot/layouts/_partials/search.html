<div class="recipe-search-container">
  <div class="recipe-search-box">
    <svg
      class="search-icon"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input
      type="search"
      id="recipe-search-input"
      placeholder="Search recipes by title, ingredients, source, or tags..."
      autocomplete="off"
      aria-label="Search recipes"
    />
    <button
      id="recipe-search-clear"
      class="search-clear-btn"
      aria-label="Clear search"
      style="display: none;"
    >
      <svg
        viewBox="0 0 24 24"
        width="16"
        height="16"
        stroke="currentColor"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  <div class="homepage-tags-bar" id="homepage-tags-bar">
    <div class="primary-tags-wrapper" id="primary-tags-wrapper"></div>
    <button type="button" class="btn-more-filters" id="btn-more-filters">
      <svg
        viewBox="0 0 24 24"
        width="14"
        height="14"
        stroke="currentColor"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
      Filters
    </button>
  </div>
  <div
    id="search-results-info"
    class="search-results-info"
    style="display: none;"
  ></div>
</div>

<!-- Search Tag Filters Modal Overlay -->
<div
  id="search-filters-modal"
  class="planner-modal-backdrop"
  style="display: none;"
>
  <div class="planner-modal-content" style="max-height: 75vh; height: auto;">
    <div class="planner-modal-header">
      <h3>Filter Recipes</h3>
      <button
        type="button"
        id="btn-close-search-filters-modal"
        class="modal-close-btn"
        title="Close filters modal"
        aria-label="Close filters modal"
      >
        ✕
      </button>
    </div>
    <div
      class="planner-modal-body scrollable-area"
      style="padding: 1.25rem 1.5rem;"
      tabindex="0"
      role="region"
      aria-label="Recipe Filters"
    >
      <div
        style="margin-bottom: 1.25rem; display: flex; gap: 0.75rem; align-items: center; justify-content: space-between;"
      >
        <span style="font-size: 0.85rem; color: var(--text-muted);">
          Active filters apply to the recipes list below.
        </span>
        <button
          type="button"
          id="btn-search-clear-filters"
          class="planner-clear-btn"
          style="font-size: 0.8rem; padding: 0.35rem 0.75rem; margin: 0;"
        >
          ✕ Clear All Filters
        </button>
      </div>
      <h4
        style="margin: 0 0 0.75rem 0; font-size: 0.95rem; color: var(--text-title);"
      >
        Filter by Tag
      </h4>
      <div
        id="search-tag-filters"
        class="planner-tag-filters"
        style="margin-bottom: 1.5rem;"
      ></div>
      <hr
        class="shopping-divider"
        style="margin: 1.25rem 0; border: 0; border-top: 1px solid var(--border-subtle);"
      />
      <h4
        style="margin: 0 0 0.75rem 0; font-size: 0.95rem; color: var(--text-title);"
      >
        Filter by Source
      </h4>
      <div id="search-source-filters" class="planner-tag-filters"></div>
    </div>
  </div>
</div>

<template id="recipe-search-item-template">
  <article class="recipe-list-item">
    <div class="recipe-list-image-container" style="display: none;">
      <div class="recipe-list-image">
        <img
          class="recipe-image"
          src=""
          srcset=""
          sizes="(max-width: 599px) 90px, 130px"
          width="130"
          height="130"
          alt=""
          loading="lazy"
        />
      </div>
    </div>
    <div class="recipe-list-content">
      <h2 class="recipe-list-title"><a class="recipe-link" href=""></a></h2>
      <div class="recipe-list-meta">
        <div class="recipe-list-meta-left">
          <time datetime="" class="recipe-list-date"></time>
          <span class="recipe-meta-separator">•</span>
          <div class="recipe-time">
            <svg
              class="time-icon"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              stroke="currentColor"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="time-text"></span>
          </div>
          <span class="recipe-meta-separator">•</span>
          <div class="recipe-source">
            <svg
              class="source-icon"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              stroke="currentColor"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="source-text"></span>
          </div>
        </div>
        <div class="recipe-tags-container" style="display: none;">
          <ul class="recipe-tags-list"></ul>
        </div>
      </div>
    </div>
  </article>
</template>
