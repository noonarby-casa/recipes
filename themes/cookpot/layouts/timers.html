{{ define "main" }}
  <div
    class="recipe-container timers-test-dashboard"
    style="display: block; overflow-y: auto; padding: 2rem 1.5rem; height: 100%; box-sizing: border-box;"
  >
    <style>
      .timers-test-dashboard {
        scrollbar-width: thin;
        background-color: var(--bg-color);
      }
      .timers-test-dashboard::-webkit-scrollbar {
        width: 6px;
      }
      .timers-test-dashboard::-webkit-scrollbar-thumb {
        background-color: var(--scrollbar-thumb);
        border-radius: 3px;
      }
      .timers-test-container {
        max-width: 900px;
        margin: 0 auto;
      }
      .timers-header {
        margin-bottom: 2.5rem;
        text-align: center;
      }
      .timers-header h1 {
        font-size: 2.25rem;
        font-weight: 800;
        margin: 0 0 0.5rem;
        background: linear-gradient(
          135deg,
          var(--noonblue, #0080d8),
          var(--noonblue-light, #3fb0ff)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .timers-header p {
        color: var(--text-muted);
        font-size: 1.1rem;
        margin: 0;
      }
      .timers-content {
        margin-top: 1.5rem;
      }
      .timers-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1.5rem;
        margin-bottom: 3rem;
      }
      .timers-card {
        background: var(--card-bg);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: var(--card-shadow);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .timers-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--card-shadow);
      }
      .timers-card h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0 0 0.75rem 0;
        color: var(--text-title);
        border-bottom: 1px solid var(--border-subtle);
        padding-bottom: 0.5rem;
      }
      .timers-card p {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin: 0 0 1.25rem 0;
        line-height: 1.5;
      }
      .timers-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .timers-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        background: var(--recipe-title-bg);
        border-radius: 12px;
        border: 1px solid var(--border-subtle);
      }
      .timers-item-label {
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-color);
      }
      .timers-item-desc {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }
      .timers-item-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
    </style>
    <div class="timers-test-container">
      <div class="timers-header">
        <h1>{{ .Title }}</h1>
        <p>
          A private dashboard to easily verify countdown state, sound chimes,
          and Screen Wake Lock stability.
        </p>
      </div>
      <div class="timers-content">
        {{ .Content }}
      </div>
    </div>
  </div>
{{ end }}
