{{- $duration := .Get 0 -}}
<span class="recipe-timer btn-brand" data-duration="{{ $duration }}"
  ><button
    class="recipe-timer-btn"
    type="button"
    aria-label="Start timer {{ $duration }}"
  >
    <span class="timer-icon"
      ><svg
        class="timer-svg-icon timer-play-icon"
        viewBox="0 0 24 24"
        width="14"
        height="14"
        stroke="currentColor"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="5 3 19 12 5 21 5 3"></polygon></svg
      ><svg
        class="timer-svg-icon timer-pause-icon"
        viewBox="0 0 24 24"
        width="14"
        height="14"
        stroke="currentColor"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect></svg
    ></span>
    <span class="timer-label">{{ $duration }}</span></button
  ><button
    class="recipe-timer-reset"
    type="button"
    aria-label="Reset timer"
    title="Reset timer"
  >
    <svg
      class="timer-svg-icon timer-reset-icon"
      viewBox="0 0 24 24"
      width="14"
      height="14"
      stroke="currentColor"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="1 4 1 10 7 10"></polyline>
      <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
    </svg></button></span
>{{- "" -}}
