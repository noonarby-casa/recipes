<span class="recipe-timer" data-duration="{{ .Get 0 }}">
  <button class="recipe-timer-btn" type="button" aria-label="Start timer {{ .Get 0 }}">
    <span class="timer-icon">▶</span>
    <span class="timer-label">{{ .Get 0 }}</span>
  </button>
  <button class="recipe-timer-reset" type="button" aria-label="Reset timer" title="Reset timer">⟲</button>
</span>
