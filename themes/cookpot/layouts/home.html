{{ define "main" }}
  <div class="homepage-content">
    {{ .Content }}
  </div>
  {{ $paginator := .Paginate site.RegularPages.ByDate.Reverse }}
  <div class="recipe-list">
    {{ range $paginator.Pages }}
      {{ partial "recipe-list-item.html" . }}
    {{ end }}
  </div>
  {{ partial "pagination.html" . }}
{{ end }}
